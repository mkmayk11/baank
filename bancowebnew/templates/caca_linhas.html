{% extends "base.html" %}
{% block conteudo %}
<div class="casino-background py-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">

            <div class="card p-4 text-center shadow-lg" style="background: radial-gradient(circle, #220033, #050010); border-radius: 20px; border: 3px solid #00ffff;">
                <h2 class="casino-title mb-4">🎰 Caça-Níquel Linhas Turbo (12 Slots)</h2>

                <div class="saldo mb-3">
                    <span class="text-info fw-bold">Saldo Atual:</span> 
                    <span id="saldo" class="text-light fs-5">R$ {{ "%.2f"|format(saldo) }}</span>
                </div>

                <div class="mb-4 d-flex justify-content-center">
                    <div style="max-width: 300px; width: 100%;">
                        <input type="number" id="apostaSlot" step="0.01" class="form-control form-control-lg text-center" placeholder="Valor da aposta (R$)" required style="font-size:1.2rem; border: 2px solid #00ffff; background-color:#111; color:#fff;">
                    </div>
                </div>

                <div class="slot-container mb-4">
                    <div class="slot-grid">
                        <div class="reel-box" id="q0">🍒</div>
                        <div class="reel-box" id="q1">🍋</div>
                        <div class="reel-box" id="q2">🔔</div>
                        <div class="reel-box" id="q3">⭐</div>

                        <div class="reel-box" id="q4">💎</div>
                        <div class="reel-box" id="q5">🍀</div>
                        <div class="reel-box" id="q6">🍉</div>
                        <div class="reel-box" id="q7">🍇</div>

                        <div class="reel-box" id="q8">🎰</div>
                        <div class="reel-box" id="q9">🍒</div>
                        <div class="reel-box" id="q10">🍋</div>
                        <div class="reel-box" id="q11">🔔</div>
                    </div>
                </div>

                <div id="resultadoSlot" class="alert alert-dark mt-2 d-none" style="border: 2px solid #00ffff; color:#fff; font-weight:bold; background-color: #111;">
                </div>

                <button id="btnGirar" onclick="jogarCacaLinhas()" class="btn btn-info text-dark fw-bold mt-2" style="font-size:1.3rem; padding:12px 40px; border-radius:10px; box-shadow:0 0 15px #00ffff;">GIRAR SLOTS 🎲</button>
            </div>
        </div>
    </div>
</div>

<style>
/* Background Estilo Cassino Noturno */
.casino-background {
    background: url('https://images.unsplash.com/photo-1601999135003-142d1f6aa391?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
    background-size: cover;
    min-height: 100vh;
}

/* Título Neon Ciano */
.casino-title {
    color: #00ffff;
    text-shadow: 0 0 5px #fff, 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff;
}

/* Container dos slots fixando linhas e colunas */
.slot-container {
    background: #000;
    padding: 20px;
    border-radius: 15px;
    border: 2px solid #330066;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
}

/* Grade de 4 colunas */
.slot-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    max-width: 500px;
    margin: 0 auto;
}

/* Estilização Individual de cada Quadrado */
.reel-box {
    height: 80px;
    font-size: 45px;
    line-height: 80px;
    text-align: center;
    border-radius: 12px;
    background: linear-gradient(145deg, #1f0033, #0a0015);
    border: 2px solid #330066;
    box-shadow: inset 0 0 10px #000;
    transition: all 0.15s ease;
}

/* Animação de Giro Ultra Rápido */
.reel-box.giro-turbo {
    animation: turboSpin 0.08s infinite linear;
    border-color: #00ffff;
    box-shadow: 0 0 10px #00ffff;
}

@keyframes turboSpin {
    0% { transform: scale(1); filter: blur(2px); }
    50% { transform: scale(0.92); filter: blur(4px); }
    100% { transform: scale(1); filter: blur(2px); }
}

/* Realce para as Linhas que ganharam */
.reel-box.ganhou-linha {
    border-color: #ffdd00 !important;
    box-shadow: 0 0 20px #ffdd00 !important;
    background: linear-gradient(145deg, #443300, #110900) !important;
    transform: scale(1.05);
}
</style>

<script>
const simbolos = ["🍒", "🍋", "🔔", "⭐", "💎", "🍀", "🍉", "🍇", "🎰"];

function jogarCacaLinhas() {
    const apostaInput = document.getElementById("apostaSlot");
    const valorAposta = parseFloat(apostaInput.value);
    const btnGirar = document.getElementById("btnGirar");
    const divResultado = document.getElementById("resultadoSlot");

    if (!valorAposta || valorAposta <= 0) {
        alert("Por favor, digite um valor de aposta válido.");
        return;
    }

    // Bloqueia interações enquanto gira
    btnGirar.disabled = true;
    apostaInput.disabled = true;
    divResultado.classList.add("d-none");

    // Aplica a animação ultra rápida em todos os 12 slots simultaneamente
    for (let i = 0; i < 12; i++) {
        const quadrado = document.getElementById(`q${i}`);
        quadrado.classList.remove("ganhou-linha");
        quadrado.classList.add("giro-turbo");
    }

    // Fica trocando os símbolos na tela de forma aleatória em alta velocidade
    let loopSimulacao = setInterval(() => {
        for (let i = 0; i < 12; i++) {
            document.getElementById(`q${i}`).innerText = simbolos[Math.floor(Math.random() * simbolos.length)];
        }
    }, 50);

    // Envia a requisição assíncrona ao Flask
    fetch('/jogos', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            tipo: 'caca_linhas',
            aposta: valorAposta
        })
    })
    .then(response => response.json())
    .then(data => {
        // Interrompe o loop visual randômico após receber a resposta do servidor
        clearInterval(loopSimulacao);

        if (data.erro) {
            alert(data.erro);
            pararAnimacaoImediato();
            return;
        }

        // Para os quadrados de forma progressiva/lenta (Efeito Cascata de Parada)
        let delay = 0;
        for (let i = 0; i < 12; i++) {
            setTimeout(() => {
                const elemento = document.getElementById(`q${i}`);
                elemento.classList.remove("giro-turbo");
                elemento.innerText = data.quadrados[i]; // Fixa o valor oficial do banco
                
                // Se terminou de parar o último quadrado
                if (i === 11) {
                    exibirFimDeJogo(data);
                }
            }, delay);
            // Incrementa o tempo de resposta a cada bloco de colunas para simular a parada lenta
            if ((i + 1) % 4 === 0) {
                delay += 400; 
            } else {
                delay += 80;
            }
        }
    })
    .catch(err => {
        clearInterval(loopSimulacao);
        alert("Erro de comunicação com o servidor.");
        pararAnimacaoImediato();
    });
}

function pararAnimacaoImediato() {
    const btnGirar = document.getElementById("btnGirar");
    const apostaInput = document.getElementById("apostaSlot");
    btnGirar.disabled = false;
    apostaInput.disabled = false;
    for (let i = 0; i < 12; i++) {
        document.getElementById(`q${i}`).classList.remove("giro-turbo");
    }
}

function exibirFimDeJogo(data) {
    const btnGirar = document.getElementById("btnGirar");
    const apostaInput = document.getElementById("apostaSlot");
    const divResultado = document.getElementById("resultadoSlot");

    // Atualiza o saldo global na tela do usuário
    document.getElementById("saldo").innerText = `R$ ${data.saldo.toFixed(2)}`;

    // Exibe o painel de resultados com o texto enviado do back-end
    divResultado.innerText = data.resultado;
    divResultado.classList.remove("d-none");

    // Se o usuário obteve linhas ganhas, destaca visualmente os blocos correspondentes
    if (data.linhas_ganhas > 0) {
        destacarLinhasVitoriosas(data.quadrados);
    }

    // Libera o botão para uma nova jogada
    btnGirar.disabled = false;
    apostaInput.disabled = false;
}

function destacarLinhasVitoriosas(quadrados) {
    const linhas = [
        [0, 1, 2, 3],   // Linha Superior
        [4, 5, 6, 7],   // Linha Central
        [8, 9, 10, 11]  // Linha Inferior
    ];

    linhas.forEach(indices => {
        const valores = indices.map(idx => quadrados[idx]);
        const contagem = {};
        valores.forEach(v => contagem[v] = (contagem[v] || 0) + 1);
        const maxRepetidos = Math.max(...Object.values(contagem));

        // Se a linha cumpre a regra de vitória do back-end, acende as bordas e fundos em dourado neon
        if (maxRepetidos >= 3) {
            indices.forEach(idx => {
                document.getElementById(`q${idx}`).classList.add("ganhou-linha");
            });
        }
    });
}
</script>
{% endblock %}
